<section class="catalog">
  <div class="catalog__container container">
    <div class="catalog__content">
      <div class="catalog__toggle-wrapper">
        <button class="catalog__toggle">
          <span class="catalog__toggle-text">All categories</span>
          <svg width="19" height="11">
            <use href="@img/sprite.svg#catalog--back_arrow"></use>
          </svg>
        </button>
      </div>
      <ul class="catalog__filter-list">
        <li class="catalog__filter-item">
          <button class="catalog__filter-btn">All categories</button>
        </li>
        <li class="catalog__filter-item">
          <button class="catalog__filter-btn">
            Vitamins & Dietary Supplements
          </button>
        </li>
        <li class="catalog__filter-item">
          <button class="catalog__filter-btn">Weight Loss</button>
        </li>
        <li class="catalog__filter-item">
          <button class="catalog__filter-btn">Minerals</button>
        </li>
        <li class="catalog__filter-item">
          <button class="catalog__filter-btn">Antioxidants</button>
        </li>
        <li class="catalog__filter-item">
          <button class="catalog__filter-btn">Probiotics</button>
        </li>
        <li class="catalog__filter-item">
          <button class="catalog__filter-btn">Pain Relief</button>
        </li>
        <li class="catalog__filter-item">
          <button class="catalog__filter-btn">Prenatal Vitamins</button>
        </li>
        <li class="catalog__filter-item">
          <button class="catalog__filter-btn sale">Sale%</button>
        </li>
      </ul>
      <div class="catalog__items"></div>
    </div>
    <button class="catalog__load-more-btn" type="button">
      View more
      <svg width="13" height="8">
        <use href="@img/sprite.svg#catalog--back_arrow"></use>
      </svg>
    </button>
  </div>
</section>
