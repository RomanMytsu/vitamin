<div class="profile-password__container container">
  <div class="profile-password__wrapper">
    <h2 class="profile__page-title">Change Password</h2>
    <form class="profile-password__form" id="profile-password" novalidate>
      <div class="profile-password__fields-wrapper">
        <div class="profile-password__field">
          <label for="current-password">Current Password</label>
          <input
            type="password"
            id="current-password"
            name="current-password"
          />
        </div>
        <div class="profile-password__field">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" name="new-password" />
        </div>
        <div class="profile-password__field">
          <label for="confirm-password">Confirm New Password</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
          />
        </div>
      </div>
      <button
        class="profile-password__btn"
        type="submit"
        id="password-btn"
        disabled
      >
        Save
      </button>
    </form>
  </div>
</div>
