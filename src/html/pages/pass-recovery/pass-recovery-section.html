<section class="pass-recovery">
  <div class="pass-recovery__container container">
    <div class="pass-recovery__content">
      <div class="pass-recovery__nav">
        <a href="index.html" class="sign-in__logo-link">
          <svg width="42" height="50">
            <use href="@img/sprite.svg#logo"></use>
          </svg>
        </a>
        <div class="sign-in__mob-nav">
          <a href="index.html" class="sign-in__mob-nav-back">
            <svg width="32" height="34">
              <use href="@img/sprite.svg#sign-up--back_arrow"></use>
            </svg>
          </a>
          <p>Account</p>
        </div>
      </div>
      <div class="pass-recovery__form-content">
        <p class="pass-recovery__title">Recover password</p>
        <p class="pass-recovery__text">Please enter your email:</p>
        <div class="pass-recovery__form-wrapper">
          <form class="pass-recovery__form" id="pass-recovery-form">
            <input type="email" id="email" placeholder="Email" required />
            <button class="pass-recovery__btn-form" type="submit">
              Recover
            </button>
          </form>
        </div>
      </div>
      <p class="pass-recovery__already-have-acc">
        Remember your password?
        <a href="sign-in.html" class="pass-recovery__already-link"
          >Back to login</a
        >
      </p>
    </div>
  </div>
</section>
